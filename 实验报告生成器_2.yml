    id: f4ac0d85-fca9-4478-9dd1-ed5f1fa08be7
    name: GLOBAL_MD_STYLE
    selector:
    - env
    - GLOBAL_MD_STYLE
    value: "【全局 Markdown 学术排版规范（极其严格）】\n你的输出必须是一段纯净的 Markdown 文本。为了保证最终拼接的实验报告格式统一，请严格遵守以下所有排版红线：\n\
      \n1. 标题层级规范：\n   - 严禁使用一级标题（#），因为它是整个报告的大标题。\n   - 你的小节主标题必须使用二级标题（## 标题名）。\n\
      \   - 内部子目录使用三级标题（### 标题名），严禁跳跃层级。\n\n2. 字体与强调规范：\n   - 纯净输出，绝对禁止使用 HTML 的 <font>\
      \ 标签去强行修改字体和字号。\n   - 关键物理概念或核心结论，请使用加粗（**文字**）进行强调。\n\n3. 数学公式规范（极其重要）：\n \
      \  - 行内公式：必须使用单个美元符号包裹，如 `$E=mc^2$`，公式与前后汉字之间保留一个空格。\n   - 独立居中公式：必须使用双美元符号包裹（$$...$$）。\n\
      \   - 公式编号：所有独立公式必须在末尾使用 LaTeX 的 \\tag{} 语法进行标号。\n     示例代码：\n     $$\n    \
      \ F = k \\cdot \\Delta x \\tag{1}\n     $$\n     （注意：不要手动敲空格去对齐括号，\\tag 语法会自动让编号在页面最右侧对齐）。\n\
      \n4. 数据表排版规范：\n   - 所有 Markdown 表格的上方，必须紧挨着一行居中的表格标题。\n   - 必须使用 HTML 居中标签：`<center>表\
      \ X：表格描述名称</center>`\n   - 标题与下方的表格之间必须留出一个空行。\n\n5. 图片占位与图注规范：\n   - 如果需要插入本地图片，必须使用\
      \ HTML 标签以限制宽度：`<img src=\"figure_X.png\" width=\"80%\">`\n   - 图片的正下方，必须紧挨着一行居中的图注说明：`<center>图\
      \ X：图片描述名称</center>`\n\n6. 纯净输出命令：\n   - 请直接输出排版后的 Markdown 文本内容，绝对不要在最外层使用\
      \ ```markdown 代码块标记包裹！"
    value_type: string
  - description: 文章结构
    id: f2ece085-0e52-48b7-9390-f9abf4b10ab3
    name: structure
    selector:
    - env
    - structure
    value: '# 文章结构

      ## 一、实验目的<!-- 分条简述实验目的，如果“实验指导书”中明确分条列出了实验目的，则直接照搬 -->

      <!-- 此处为正文 -->

      ## 二、实验原理<!-- 简述实验原理，包括基本的公式、定理定律、实验方法、测量方法、数据处理方法等-- >

      <!-- 此处为正文 -->

      ## 三、实验装置 <!-- 列出实验所用的仪器、试件等 --!>：

      <!-- 此处为正文 -->

      ## 四、实验步骤 <!-- 分条简述实验步骤，如果“实验指导书”中的实验步骤比较冗长，需要进行减省 --!>：

      <!-- 此处为正文 -->

      ## 五、实验结果<!-- 分条呈现实验得到的数据、曲线、需要计算的物理量等，需要分析的地方加入数据分析-->

      <!-- 此处为正文 -->

      ## 六、总结  <!-- 对之前实验结果的总结，对实验提出建议，或者谈谈自己的感想 -->

      <!-- 此处为正文 -->

      # 文章结构的标题层级：

      - 只使用三个级别的标题，

      - 第一级是中国小写数字，如：一

      - 第二级标题是阿拉伯数字标题，如：1

      - 第三级标题是两位阿拉伯数字，如：1.1'
    value_type: string
