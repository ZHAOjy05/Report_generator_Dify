    - data:
        code: "import json\nimport requests\nimport csv\nimport io\n\ndef main(file_url:\
          \ str) -> dict:\n    try:\n        if not file_url:\n            return\
          \ {\"schema_str\": \"错误: 未获取到文件链接\", \"status\": \"error\"}\n        \n\
          \        response = requests.get(file_url)\n        response.raise_for_status()\n\
          \        \n        try:\n            content = response.content.decode('utf-8')\n\
          \        except UnicodeDecodeError:\n            content = response.content.decode('gbk')\n\
          \            \n        reader = csv.reader(io.StringIO(content))\n     \
          \   \n        tables_info = []\n        \n        # 状态追踪机\n        current_table_name\
          \ = None\n        current_headers = []\n        current_data = []\n    \
          \    header_line_num = None\n        data_start_line_num = None\n      \
          \  \n        table_counter = 1\n        global_line_num = 0\n\n        def\
          \ save_current_table(end_line_num):\n            nonlocal current_table_name,\
          \ current_headers, current_data, header_line_num, data_start_line_num, table_counter,\
          \ tables_info\n            if current_headers or current_data:\n       \
          \         name = current_table_name if current_table_name else f\"未命名数据表_{table_counter}\"\
          \n                \n                # 计算统计特征\n                col_stats\
          \ = {}\n                for col_idx, header in enumerate(current_headers):\n\
          \                    numeric_vals = []\n                    for row in current_data:\n\
          \                        if col_idx < len(row):\n                      \
          \      val_str = row[col_idx].strip()\n                            if val_str:\n\
          \                                try:\n                                \
          \    numeric_vals.append(float(val_str))\n                             \
          \   except ValueError:\n                                    pass\n     \
          \               if numeric_vals:\n                        col_stats[header]\
          \ = {\"min\": min(numeric_vals), \"max\": max(numeric_vals)}\n         \
          \       \n                tables_info.append({\n                    \"table_name\"\
          : name,\n                    \"csv_location\": {\n                     \
          \   \"header_row\": header_line_num,\n                        \"data_start_row\"\
          : data_start_line_num,\n                        \"data_end_row\": end_line_num,\n\
          \                        \"total_columns\": len(current_headers)\n     \
          \               },\n                    \"total_data_points\": len(current_data),\n\
          \                    \"columns\": current_headers,\n                   \
          \ \"column_statistics_min_max\": col_stats,\n                    \"sample_data\"\
          : current_data[:3]\n                })\n                table_counter +=\
          \ 1\n            \n            # 重置状态\n            current_table_name =\
          \ None\n            current_headers = []\n            current_data = []\n\
          \            header_line_num = None\n            data_start_line_num = None\n\
          \n        for row in reader:\n            global_line_num += 1\n       \
          \     \n            # 自动清理 Excel 产生的多余尾随空列\n            while row and not\
          \ row[-1].strip():\n                row.pop()\n                \n      \
          \      cleaned_row = [str(c).strip() for c in row]\n            non_empty_cells\
          \ = [c for c in cleaned_row if c]\n            \n            # 遇到空行，截断并保存上一张表\n\
          \            if not non_empty_cells:\n                if current_headers:\n\
          \                    save_current_table(global_line_num - 1)\n         \
          \       continue\n                \n            if not current_headers:\n\
          \                # 识别表名：如果只有第一个单元格有字\n                if len(non_empty_cells)\
          \ == 1 and cleaned_row[0] != \"\":\n                    current_table_name\
          \ = cleaned_row[0]\n                else:\n                    # 识别表头\n\
          \                    current_headers = cleaned_row\n                   \
          \ header_line_num = global_line_num\n                    data_start_line_num\
          \ = global_line_num + 1\n            else:\n                # 记录数据行\n  \
          \              current_data.append(cleaned_row)\n                \n    \
          \    # 循环结束，保存最后一张表\n        if current_headers:\n            save_current_table(global_line_num)\n\
          \n        if not tables_info:\n            return {\"schema_str\": \"错误:\
          \ CSV文件中未读取到有效数据\", \"status\": \"error\"}\n\n        return {\n       \
          \     \"schema_str\": json.dumps(tables_info, ensure_ascii=False, indent=2),\n\
          \            \"status\": \"success\"\n        }\n        \n    except Exception\
          \ as e:\n        return {\"schema_str\": f\"解析失败: {str(e)}\", \"status\"\
          : \"error\"}"
