            \ 编码严苛规范（必须100%执行）】\n1. 文件读取与动态范围：\n   - 本地数据文件名为{{#conversation.mem_datafilename#}}，这是一个CSV文件。\n\
            \   - 必须使用 `detectImportOptions` 和 `readtable`，并严格根据 【JSON蓝图】中提供的 `csv_read_range`\
