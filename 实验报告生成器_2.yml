    - data:
        code: "import requests\nimport csv\nimport io\n\ndef main(csv_url: str) ->\
          \ dict:\n    try:\n        if not csv_url:\n            return {\"md_tables\"\
          : \"未获取到CSV文件，跳过数据表生成。\"}\n            \n        response = requests.get(csv_url)\n\
          \        response.raise_for_status()\n        \n        try:\n         \
          \   content = response.content.decode('utf-8')\n        except UnicodeDecodeError:\n\
          \            content = response.content.decode('gbk')\n            \n  \
          \      reader = csv.reader(io.StringIO(content))\n        \n        tables_md\
          \ = []\n        current_table_name = \"实验数据表\"\n        current_headers\
          \ = []\n        current_data = []\n        table_counter = 1\n        \n\
          \        # ====== 核心配置：制表行数阈值 ======\n        MAX_ROWS_TO_RENDER = 50 \n\
          \n        def format_markdown_table():\n            nonlocal current_table_name,\
          \ current_headers, current_data, table_counter, tables_md\n            if\
          \ current_headers:\n                name = current_table_name if current_table_name\
          \ else f\"数据表_{table_counter}\"\n                total_rows = len(current_data)\n\
          \                \n                # 【新增逻辑：智能过滤】如果数据量过大，直接输出占位提示，不生成庞大的表格\n\
          \                if total_rows > MAX_ROWS_TO_RENDER:\n                 \
          \   tables_md.append(f\"> \U0001F4CA **数据表：{name}**\\n> *注：该表包含 {total_rows}\
          \ 行数据，数据量过大，为保证报告可读性，具体数据请参见原始 CSV 文件。*\\n\")\n                else:\n \
          \                   # 数据量小，生成完整 Markdown 表格\n                    md_str\
          \ = f\"#### {name}\\n\\n\"\n                    md_str += \"|\" + \"|\"\
          .join(current_headers) + \"|\\n\"\n                    md_str += \"|\" +\
          \ \"|\".join([\"---\"] * len(current_headers)) + \"|\\n\"\n            \
          \        for row in current_data:\n                        padded_row =\
          \ row + [\"\"] * (len(current_headers) - len(row))\n                   \
          \     md_str += \"|\" + \"|\".join(padded_row) + \"|\\n\"\n            \
          \        tables_md.append(md_str)\n                    \n              \
          \  table_counter += 1\n\n            current_table_name = None\n       \
          \     current_headers = []\n            current_data = []\n\n        for\
          \ row in reader:\n            while row and not row[-1].strip():\n     \
          \           row.pop()\n            cleaned_row = [str(c).strip() for c in\
          \ row]\n            non_empty_cells = [c for c in cleaned_row if c]\n  \
          \          \n            if not non_empty_cells:\n                if current_headers:\
          \ format_markdown_table()\n                continue\n                \n\
          \            if len(non_empty_cells) == 1 and cleaned_row[0] != \"\":\n\
          \                try:\n                    float(cleaned_row[0])\n     \
          \               if current_headers: current_data.append(cleaned_row)\n \
          \               except ValueError:\n                    if current_headers:\
          \ format_markdown_table()\n                    current_table_name = cleaned_row[0]\n\
          \            elif not current_headers:\n                current_headers\
          \ = cleaned_row\n            else:\n                current_data.append(cleaned_row)\n\
          \                \n        if current_headers:\n            format_markdown_table()\n\
          \n        return {\"md_tables\": \"\\n\\n\".join(tables_md)}\n        \n\
          \    except Exception as e:\n        return {\"md_tables\": f\"> 无法生成数据表:\
          \ {str(e)}\"}"
