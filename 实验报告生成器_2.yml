            \ MATLAB 的自动重命名警告。\n   - 示例：\n    opts = detectImportOptions('experiment_data.csv');\
            \         opts.DataLines = [3, 150]; % 根据蓝图填入具体的起止行号 \nopts.VariableNamingRule\
